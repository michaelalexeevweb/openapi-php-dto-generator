  /api/test/dogs/{id}/tags/{tagId}:
    get:
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: 'uuid'
            example: '00000000-1111-2222-3333-444455556666'
          required: true
        - in: path
          name: tagId
          schema:
            type: integer
          required: true
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 1
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        200:
          description: test
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Test'
    patch:
      parameters:
        - $ref: '#/components/parameters/DogId'
        - $ref: '#/components/parameters/DogTagId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        200:
          description: test
          content:
