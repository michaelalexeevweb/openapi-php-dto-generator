components:
  parameters:
    DogId:
      in: path
      name: id
      schema:
        type: string
        format: 'uuid'
        example: '00000000-1111-2222-3333-444455556666'
      required: true
    DogTagId:
      in: path
      name: tagId
      schema:
        type: integer
      required: true
    CatId:
      in: path
      name: id
      schema:
        type: string
        format: 'uuid'
        example: '00000000-1111-2222-3333-444455556666'
      required: true
    CatActionId:
      in: path
      name: actionId
      schema:
        type: integer
      required: true
    Page:
      in: query
      name: page
      required: false
      schema:
        type: integer
        minimum: 1
    Limit:
      in: query
      name: limit
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
  schemas:
    Test:
      type: object
      required:
        - id
      properties:
        id:
          type: integer
    FileRequest:
      type: object
      required:
        - file
        - name
        - surname
      properties:
        file:
          $ref: '#/components/schemas/File'
        name:
          type: string
        surname:
          type: string
    File:
      type: string
      format: binary
    TestPostRequest:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
        name:
          type: string
    TestPatchRequest:
      type: object
      required:
        - id
        - name
        - surname
      properties:
        id:
          type: integer
        name:
          type: string
        surname:
          type: string
    Test2:
      type: object
      required:
        - id
        - name
        - tags
        - types
      properties:
        id:
          description: this is id
          type: integer
          default: 1
        name:
          description: >
            this 
            is 
            name
          type: string
        tags:
          type: array
          items:
            $ref: '#/components/schemas/Tag'
        user:
          $ref: '#/components/schemas/User'
        userType:
          type: object
          properties:
            region:
              type: string
        types:
          type: string
          enum:
            - cat
            - dog
    Tag:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
        name:
          type: string
    TypeEnum:
      type: string
      enum:
        - catType
        - dogType
    User:
      type: object
      required:
        - id
        - name
        - pet
        - createdAt
      properties:
        id:
          type: integer
        name:
          type: string
        pet:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/Animal2'
        createdAt:
          type: string
          format: date-time
    User2:
      type: object
      required:
        - id
        - name
        - pet
        - createdAt
      properties:
        id:
          type: integer
        name:
          type: string
        pet:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/Cat'
            - $ref: '#/components/schemas/Dog'
            - type: object
              required:
                - test
              properties:
                test:
                  type: string
            - type: object
              required:
                - test
              properties:
                test:
                  type: string
        createdAt:
          type: string
          format: date
    Animal:
      oneOf:
        - $ref: '#/components/schemas/Cat'
        - $ref: '#/components/schemas/Dog'
        - type: object
          required:
            - test
          properties:
            test:
              type: string
    Animal2:
      anyOf:
        - $ref: '#/components/schemas/Cat'
        - $ref: '#/components/schemas/Dog'
        - $ref: '#/components/schemas/Dog2'
        - type: object
          required:
            - test2
          properties:
            test2:
              type: string
    Cat:
      allOf:
        - $ref: '#/components/schemas/Pet'
        - type: object
          required:
            - meow
          properties:
            meow:
              type: string
    Dog:
      allOf:
        - $ref: '#/components/schemas/Pet'
        - type: object
          required:
            - bark
          properties:
            bark:
              type: string
    Dog2:
      allOf:
        - $ref: '#/components/schemas/Pet'
        - type: object
          required:
            - bark
          properties:
            bark:
              type: string
    Pet:
      type: object
      required:
        - name
      properties:
        name:
          type: string
    Discriminator:
      type: object
      required:
        - type
        - name
      properties:
        type:
          type: string
          enum:
            - discriminator1
            - discriminator2
        name:
          type: string
          nullable: true
      discriminator:
        propertyName: type
        mapping:
          discriminator1: '#/components/schemas/Discriminator1'
          discriminator2: '#/components/schemas/Discriminator2'
    Discriminator1:
      allOf:
        - $ref: '#/components/schemas/Discriminator'
        - type: object
          required:
            - id
          properties:
            id:
              type: integer
    Discriminator2:
      allOf:
        - $ref: '#/components/schemas/Discriminator'
        - type: object
          required:
            - id
            - NAme
          properties:
            id:
              type: integer
            NAme:
              type: string
