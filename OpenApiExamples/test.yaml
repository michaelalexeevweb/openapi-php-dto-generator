  /api/test/cats/{id}/actions/{actionId}:
    get:
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: 'uuid'
            example: '00000000-1111-2222-3333-444455556666'
          required: true
        - in: path
          name: actionId
          schema:
            type: integer
          required: true
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 1
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
