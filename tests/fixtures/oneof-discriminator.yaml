openapi: 3.1.0
info:
  title: oneOf-based discriminator
  version: 1.0.0
paths: { }
components:
  schemas:
    PetBase:
      oneOf:
        - $ref: '#/components/schemas/DogPet'
        - $ref: '#/components/schemas/CatPet'
      discriminator:
        propertyName: petType
        mapping:
          dog: '#/components/schemas/DogPet'
          cat: '#/components/schemas/CatPet'
    DogPet:
      type: object
      required: [petType, bark]
      properties:
        petType: { type: string }
        bark: { type: string }
    CatPet:
      type: object
      required: [petType, meow]
      properties:
        petType: { type: string }
        meow: { type: string }
    PetOwner:
      type: object
      required: [pet]
      properties:
        pet:
          $ref: '#/components/schemas/PetBase'
