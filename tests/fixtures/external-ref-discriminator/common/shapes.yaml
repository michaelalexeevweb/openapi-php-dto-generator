openapi: 3.0.0
info:
  title: Lib
  version: 1.0.0
paths: { }
components:
  schemas:
    ShapeView:
      type: object
      required:
        - kind
      properties:
        kind:
          type: string
      discriminator:
        propertyName: kind
        mapping:
          circle: '#/components/schemas/CircleShapeView'
          square: '#/components/schemas/SquareShapeView'
    CircleShapeView:
      type: object
      required:
        - radius
      properties:
        radius:
          type: integer
    SquareShapeView:
      type: object
      required:
        - side
      properties:
        side:
          type: integer
    UnusedShape:
      type: object
      required:
        - foo
      properties:
        foo:
          type: string
