openapi: 3.0.3
info:
  title: Array of enums and nested DTOs
  version: 1.0.0
paths: { }
components:
  schemas:
    Color:
      type: string
      enum:
        - red
        - green
        - blue
    Tag:
      type: object
      required:
        - name
      properties:
        name:
          type: string
    Box:
      type: object
      required:
        - colors
        - tags
      properties:
        colors:
          type: array
          items:
            $ref: '#/components/schemas/Color'
        tags:
          type: array
          items:
            $ref: '#/components/schemas/Tag'
